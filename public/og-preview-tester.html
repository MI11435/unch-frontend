<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OG Preview Tester - UntitledCharts</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: #fff;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
            background: linear-gradient(135deg, #38bdf8, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 40px;
        }

        .input-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }

        label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
        }

        input[type="text"] {
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #38bdf8;
        }

        .btn-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .preview-section {
            margin-top: 30px;
        }

        .preview-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            font-size: 1.1rem;
        }

        .preview-card {
            background: #36393f;
            border-radius: 4px;
            padding: 16px;
            max-width: 520px;
            border-left: 4px solid #5865f2;
        }

        .preview-site-name {
            color: #00b0f4;
            font-size: 0.75rem;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .preview-title {
            color: #00aff4;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 8px;
            text-decoration: underline;
            cursor: pointer;
        }

        .preview-description {
            color: #dcddde;
            font-size: 0.875rem;
            line-height: 1.4;
            white-space: pre-wrap;
            margin-bottom: 12px;
        }

        .preview-image {
            width: 100%;
            max-width: 400px;
            border-radius: 4px;
            margin-top: 8px;
        }

        .preview-footer {
            color: #72767d;
            font-size: 0.75rem;
            margin-top: 8px;
        }

        .meta-display {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.85rem;
            overflow-x: auto;
        }

        .meta-display pre {
            color: #a5f3fc;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .quick-links {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .quick-link {
            padding: 6px 12px;
            background: rgba(56, 189, 248, 0.2);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 6px;
            color: #38bdf8;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .quick-link:hover {
            background: rgba(56, 189, 248, 0.3);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #38bdf8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            padding: 16px;
            color: #fca5a5;
            margin-top: 20px;
            display: none;
        }

        .error.active {
            display: block;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.5rem;
            }

            .preview-card {
                max-width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🔍 OG Preview Tester</h1>
        <p class="subtitle">Test OpenGraph meta tags for UntitledCharts pages</p>

        <div class="input-section">
            <div class="input-group">
                <label for="urlInput">Enter URL to test:</label>
                <input type="text" id="urlInput" placeholder="https://untitledcharts.com/levels/UnCh-123" />
            </div>
            <div class="btn-row">
                <button class="btn-primary" onclick="fetchOG()">🔍 Fetch OG Tags</button>
                <button class="btn-secondary" onclick="clearResults()">Clear</button>
            </div>
            <div class="quick-links">
                <span style="color: rgba(255,255,255,0.5); font-size: 0.8rem;">Quick test: </span>
                <span class="quick-link" onclick="testUrl('/levels/UnCh-1')">Level 1</span>
                <span class="quick-link" onclick="testUrl('/levels/UnCh-100')">Level 100</span>
                <span class="quick-link" onclick="testUrl('/?view=search')">Search</span>
                <span class="quick-link" onclick="testUrl('/')">Homepage</span>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Fetching meta tags...</p>
        </div>

        <div class="error" id="error"></div>

        <div class="preview-section" id="previewSection" style="display: none;">
            <div class="preview-header">
                <span>📱</span>
                <span>Discord Preview</span>
            </div>
            <div class="preview-card">
                <div class="preview-site-name" id="previewSiteName">UntitledCharts</div>
                <div class="preview-title" id="previewTitle">Chart Title</div>
                <div class="preview-description" id="previewDescription">Chart description goes here...</div>
                <img class="preview-image" id="previewImage" src="" alt="OG Image" style="display: none;" />
                <div class="preview-footer" id="previewFooter"></div>
            </div>

            <div class="meta-display">
                <h4 style="color: #fff; margin-bottom: 12px;">📋 Raw Meta Tags</h4>
                <pre id="rawMeta"></pre>
            </div>
        </div>
    </div>

    <script>
        const baseUrl = window.location.origin || 'https://untitledcharts.com';

        function testUrl(path) {
            document.getElementById('urlInput').value = baseUrl + path;
            fetchOG();
        }

        async function fetchOG() {
            const urlInput = document.getElementById('urlInput');
            let url = urlInput.value.trim();

            if (!url) {
                showError('Please enter a URL to test');
                return;
            }

            // Add base URL if relative path
            if (url.startsWith('/')) {
                url = baseUrl + url;
            }

            // Show loading
            document.getElementById('loading').classList.add('active');
            document.getElementById('error').classList.remove('active');
            document.getElementById('previewSection').style.display = 'none';

            try {
                // Use a CORS proxy or direct fetch if same origin
                const response = await fetch(url);
                const html = await response.text();

                // Parse the HTML
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');

                // Extract meta tags
                const meta = {
                    title: getMetaContent(doc, 'og:title') || doc.title,
                    description: getMetaContent(doc, 'og:description') || getMetaContent(doc, 'description'),
                    image: getMetaContent(doc, 'og:image'),
                    siteName: getMetaContent(doc, 'og:site_name') || 'UntitledCharts',
                    themeColor: getMetaContent(doc, 'theme-color'),
                    twitterCard: getMetaContent(doc, 'twitter:card'),
                    twitterTitle: getMetaContent(doc, 'twitter:title'),
                    twitterDescription: getMetaContent(doc, 'twitter:description'),
                    twitterImage: getMetaContent(doc, 'twitter:image'),
                };

                displayResults(meta, url);
            } catch (err) {
                showError(`Failed to fetch URL: ${err.message}. Make sure the URL is accessible.`);
            }

            document.getElementById('loading').classList.remove('active');
        }

        function getMetaContent(doc, name) {
            const ogMeta = doc.querySelector(`meta[property="${name}"]`);
            if (ogMeta) return ogMeta.getAttribute('content');

            const nameMeta = doc.querySelector(`meta[name="${name}"]`);
            if (nameMeta) return nameMeta.getAttribute('content');

            return null;
        }

        function displayResults(meta, url) {
            document.getElementById('previewSection').style.display = 'block';

            document.getElementById('previewSiteName').textContent = meta.siteName || 'UntitledCharts';
            document.getElementById('previewTitle').textContent = meta.title || 'No title';
            document.getElementById('previewDescription').textContent = meta.description || 'No description';

            const imgEl = document.getElementById('previewImage');
            if (meta.image) {
                // Handle relative image URLs
                let imgUrl = meta.image;
                if (imgUrl.startsWith('/')) {
                    imgUrl = baseUrl + imgUrl;
                }
                imgEl.src = imgUrl;
                imgEl.style.display = 'block';
            } else {
                imgEl.style.display = 'none';
            }

            document.getElementById('previewFooter').textContent = meta.themeColor ? `Theme: ${meta.themeColor}` : '';

            // Raw meta display
            const rawMeta = document.getElementById('rawMeta');
            let rawText = `URL: ${url}\n\n`;
            rawText += `=== OpenGraph ===\n`;
            rawText += `og:title: ${meta.title || '(not set)'}\n`;
            rawText += `og:description: ${meta.description || '(not set)'}\n`;
            rawText += `og:image: ${meta.image || '(not set)'}\n`;
            rawText += `og:site_name: ${meta.siteName || '(not set)'}\n\n`;
            rawText += `=== Twitter ===\n`;
            rawText += `twitter:card: ${meta.twitterCard || '(not set)'}\n`;
            rawText += `twitter:title: ${meta.twitterTitle || '(not set)'}\n`;
            rawText += `twitter:description: ${meta.twitterDescription || '(not set)'}\n`;
            rawText += `twitter:image: ${meta.twitterImage || '(not set)'}\n\n`;
            rawText += `=== Other ===\n`;
            rawText += `theme-color: ${meta.themeColor || '(not set)'}\n`;

            rawMeta.textContent = rawText;
        }

        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = '❌ ' + message;
            errorEl.classList.add('active');
        }

        function clearResults() {
            document.getElementById('urlInput').value = '';
            document.getElementById('previewSection').style.display = 'none';
            document.getElementById('error').classList.remove('active');
        }

        // Allow Enter key to submit
        document.getElementById('urlInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchOG();
        });
    </script>
</body>

</html>
